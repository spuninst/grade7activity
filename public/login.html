<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 7 Grad Survey — Sign In</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  padding: 40px 36px 36px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.login-icon { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 6px; }
input[type=password] {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 15px;
  color: #1e293b;
  background: #f8fafc;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 16px;
}
input[type=password]:focus { border-color: #2563eb; background: #fff; }
button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 9px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #1d4ed8; }
.error-msg {
  background: #fee2e2;
  color: #dc2626;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 16px;
}
.survey-link {
  display: block;
  margin-top: 20px;
  font-size: 13px;
  color: #2563eb;
  text-decoration: none;
}
.survey-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-icon">🎓</div>
  <h1>Grade 7 Grad Celebration</h1>
  <p class="subtitle">Enter the survey password to continue</p>

  <div class="error-msg" id="error-msg" style="display:none">Incorrect password. Please try again.</div>

  <form method="POST" action="/auth/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" autofocus required>
    <button type="submit">Sign In →</button>
  </form>
</div>
<script>
  if (location.search.includes('error=1')) {
    document.getElementById('error-msg').style.display = '';
  }
</script>
</body>
</html>
